<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
        viewBox="0 0 256 256"
        width="256"
        height="256"
        version="1.1"
        id="svg5"
        sodipodi:docname="logo.svg"
        inkscape:version="1.4.2 (ebf0e940d0, 2025-05-08)"
        inkscape:export-filename="../images/logo.webp"
        inkscape:export-xdpi="96"
        inkscape:export-ydpi="96"
        xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
        xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
        xmlns="http://www.w3.org/2000/svg"
        xmlns:svg="http://www.w3.org/2000/svg">
    <sodipodi:namedview
            id="namedview5"
            pagecolor="#505050"
            bordercolor="#eeeeee"
            borderopacity="1"
            inkscape:showpageshadow="0"
            inkscape:pageopacity="0"
            inkscape:pagecheckerboard="0"
            inkscape:deskcolor="#d1d1d1"
            inkscape:zoom="3.609375"
            inkscape:cx="127.86147"
            inkscape:cy="-4.987013"
            inkscape:window-width="2215"
            inkscape:window-height="1929"
            inkscape:window-x="0"
            inkscape:window-y="0"
            inkscape:window-maximized="0"
            inkscape:current-layer="svg5" />
    <defs
            id="defs3">
        <!-- The signature "Aura" Gradient -->
        <linearGradient
                id="auraGlow"
                x1="0%"
                y1="0%"
                x2="100%"
                y2="100%">
            <stop
                    offset="0%"
                    stop-color="#FF007A"
                    id="stop1" />
            <!-- Vibrant Pink -->
            <stop
                    offset="50%"
                    stop-color="#7A00FF"
                    id="stop2" />
            <!-- Deep Purple -->
            <stop
                    offset="100%"
                    stop-color="#00E5FF"
                    id="stop3" />
            <!-- Electric Cyan -->
        </linearGradient>
        <!-- Glowing outer aura effect for the frame -->
        <filter
                id="glow"
                x="-0.16470588"
                y="-0.18666667"
                width="1.3294118"
                height="1.3733333">
            <feGaussianBlur
                    stdDeviation="6"
                    result="blur"
                    id="feGaussianBlur3" />
            <feComposite
                    in="SourceGraphic"
                    in2="blur"
                    operator="over"
                    id="feComposite3" />
        </filter>
    </defs>
    <!-- Circular Badge Background (JetBrains Dark Theme color) -->
    <g
            inkscape:groupmode="layer"
            id="layer1"
            inkscape:label="bg"
            sodipodi:insensitive="true">
        <circle
                cx="128"
                cy="128"
                r="120"
                fill="#2b2d30"
                id="circle3"
                style="display:inline"
                inkscape:label="outer" />
        <circle
                cx="128"
                cy="128"
                r="116"
                fill="none"
                stroke="#393b40"
                stroke-width="4"
                id="circle4"
                style="display:none"
                inkscape:label="inner" />
    </g>
    <!-- Subtle inner ring to give the badge a premium 3D depth -->
    <!-- The Workspace / Project Element -->
    <g
            filter="url(#glow)"
            id="g5"
            inkscape:label="rect"
            sodipodi:insensitive="true">
        <!-- The inner tint (Workspace ambient glow) -->
        <rect
                x="60"
                y="68"
                width="136"
                height="120"
                rx="16"
                fill="url(#auraGlow)"
                fill-opacity="0.15"
                id="rect4"
                style="display:inline"
                inkscape:label="rect-bg" />
        <!-- The Extra Colored Frame (thick strokes for low-res readability) -->
        <rect
                x="60"
                y="68"
                width="136"
                height="120"
                rx="16"
                fill="none"
                stroke="url(#auraGlow)"
                stroke-width="16"
                id="rect5"
                style="display:inline"
                inkscape:label="rect-glow" />
        <!-- IDE Top Bar separator line -->
    </g>
</svg>
